<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Output Parser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid #1e2533;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #f8fafc; }
    .badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 999px;
      background: #1e3a5f; color: #60a5fa; font-weight: 600;
    }

    /* ── Layout ───────────────────────────────────────────────────────── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr 260px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }
    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; }
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1e2533;
      overflow: hidden;
      min-height: 0;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 8px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #1e2533;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-header .acts { display: flex; gap: 6px; }

    textarea, .scroll-body {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    textarea {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      padding: 14px;
      background: transparent;
      color: #e2e8f0;
      border: none;
      resize: none;
      outline: none;
    }
    textarea::placeholder { color: #3d4f6b; }

    .scroll-body { padding: 16px; }

    /* ── Buttons / controls ───────────────────────────────────────────── */
    button, select {
      font-size: 0.78rem;
      border-radius: 6px;
      border: 1px solid #2d3748;
      background: #1a2035;
      color: #e2e8f0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button { padding: 4px 12px; font-weight: 500; }
    button:hover { background: #243050; border-color: #3b82f6; }
    button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    button.primary:hover { background: #1d4ed8; }

    .toolbar {
      padding: 8px 14px;
      border-bottom: 1px solid #1e2533;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .status-bar {
      padding: 4px 14px;
      font-size: 0.7rem;
      color: #64748b;
      border-top: 1px solid #1e2533;
      min-height: 24px;
      flex-shrink: 0;
    }
    .status-bar .err { color: #f87171; }
    .status-bar .ok  { color: #34d399; }

    /* ── Rendered output ──────────────────────────────────────────────── */
    .rendered { line-height: 1.7; font-size: 0.88rem; }

    /* Reasoning block */
    .reasoning-block {
      margin: 12px 0;
      border-left: 3px solid #7c3aed;
      background: #1a1030;
      border-radius: 0 6px 6px 0;
      overflow: hidden;
    }
    .reasoning-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #221540;
      font-size: 0.72rem;
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      cursor: pointer;
      user-select: none;
    }
    .reasoning-header:hover { background: #2a1a52; }
    .reasoning-body {
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #c4b5fd;
      white-space: pre-wrap;
      font-family: "JetBrains Mono", monospace;
      line-height: 1.5;
    }

    /* Markdown styles */
    .rendered h1 { font-size: 1.4em; font-weight: 700; margin: 16px 0 8px; color: #f1f5f9; border-bottom: 1px solid #1e2533; padding-bottom: 6px; }
    .rendered h2 { font-size: 1.2em; font-weight: 700; margin: 14px 0 6px; color: #f1f5f9; }
    .rendered h3 { font-size: 1.05em; font-weight: 600; margin: 12px 0 4px; color: #e2e8f0; }
    .rendered p  { margin: 8px 0; }
    .rendered ul, .rendered ol { margin: 8px 0 8px 20px; }
    .rendered li { margin: 3px 0; }
    .rendered blockquote {
      border-left: 3px solid #3b82f6;
      margin: 10px 0;
      padding: 6px 12px;
      background: #131c2e;
      color: #94a3b8;
      border-radius: 0 4px 4px 0;
    }
    .rendered hr { border: none; border-top: 1px solid #1e2533; margin: 14px 0; }
    .rendered a  { color: #60a5fa; text-decoration: underline; }
    .rendered strong { font-weight: 700; color: #f1f5f9; }
    .rendered em { font-style: italic; color: #cbd5e1; }

    /* Inline code */
    .rendered code {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.82em;
      background: #1e293b;
      color: #34d399;
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* Code blocks */
    .rendered pre {
      background: #111827;
      border: 1px solid #1e2533;
      border-radius: 8px;
      margin: 10px 0;
      overflow: auto;
    }
    .rendered pre .code-header {
      padding: 5px 12px;
      font-size: 0.7rem;
      color: #64748b;
      border-bottom: 1px solid #1e2533;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rendered pre code {
      display: block;
      padding: 12px;
      background: transparent;
      color: #e2e8f0;
      white-space: pre;
      font-size: 0.8rem;
      line-height: 1.55;
    }

    /* Code syntax tokens */
    .kw { color: #c084fc; }  /* keyword */
    .st { color: #34d399; }  /* string */
    .nm { color: #fb923c; }  /* number */
    .cm { color: #6b7280; font-style: italic; } /* comment */
    .fn { color: #60a5fa; }  /* function */
    .op { color: #94a3b8; }  /* operator */

    /* ── Stats sidebar ────────────────────────────────────────────────── */
    .stats-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .stats-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stat-group h3 {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid #1e2533;
      font-size: 0.78rem;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #64748b; }
    .stat-value { color: #e2e8f0; font-weight: 600; font-family: monospace; }
    .stat-value.highlight { color: #60a5fa; }
    .stat-value.warn      { color: #fb923c; }
    .stat-value.good      { color: #34d399; }
    .stat-value.purple    { color: #a78bfa; }

    /* Token bar */
    .token-bar {
      height: 6px;
      border-radius: 3px;
      background: #1e2533;
      margin-top: 8px;
      overflow: hidden;
    }
    .token-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      transition: width 0.3s;
    }

    .empty-stats {
      color: #3d4f6b;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 40px;
    }

    /* Role pill */
    .role-pill {
      display: inline-block;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .role-assistant { background: #1e3a5f; color: #60a5fa; }
    .role-user       { background: #14532d; color: #4ade80; }
    .role-system     { background: #3b1f00; color: #fb923c; }

    /* Format detector */
    .fmt-tag {
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 4px;
      background: #221540;
      color: #a78bfa;
      margin-left: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>LLM Output Parser</h1>
  <span class="badge">No dependencies</span>
</header>

<div class="workspace">

  <!-- ── Input panel ─────────────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-header">
      Raw JSON
      <div class="acts">
        <button id="btn-sample-oai">OpenAI sample</button>
        <button id="btn-sample-ant">Anthropic sample</button>
      </div>
    </div>
    <div class="toolbar">
      <button class="primary" id="btn-parse">Parse ↵</button>
      <button id="btn-clear">Clear</button>
    </div>
    <textarea id="input" placeholder="Paste a chat/completions API response (OpenAI or Anthropic format)…" spellcheck="false"></textarea>
    <div class="status-bar" id="status-in"></div>
  </div>

  <!-- ── Rendered output ─────────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-header">
      Rendered Output
      <div class="acts">
        <button id="btn-copy-md">Copy text</button>
      </div>
    </div>
    <div class="scroll-body" id="output">
      <span style="color:#3d4f6b; font-size:0.82rem;">Parsed output will appear here…</span>
    </div>
  </div>

  <!-- ── Stats sidebar ───────────────────────────────────────────────── -->
  <div class="panel stats-panel">
    <div class="panel-header">Metadata &amp; Stats</div>
    <div class="stats-body" id="stats">
      <div class="empty-stats">Parse a response to see stats.</div>
    </div>
  </div>

</div>

<script>
(() => {
  const inputEl  = document.getElementById('input');
  const outputEl = document.getElementById('output');
  const statsEl  = document.getElementById('stats');
  const statusIn = document.getElementById('status-in');

  // ── Simple markdown renderer ──────────────────────────────────────────

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlightCode(code, lang) {
    const e = escHtml(code);
    if (!lang || lang === 'text') return e;
    // very lightweight token colouring
    return e
      .replace(/("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`)/g, '<span class="st">$1</span>')
      .replace(/\b(function|const|let|var|return|if|else|for|while|class|import|from|export|default|new|this|typeof|async|await|def|import|print|pass|None|True|False|and|or|not|in|is)\b/g, '<span class="kw">$1</span>')
      .replace(/\b(\d+\.?\d*)\b/g, '<span class="nm">$1</span>')
      .replace(/(\/\/[^\n]*|#[^\n]*)/g, '<span class="cm">$1</span>')
      .replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g, '<span class="fn">$1</span>');
  }

  function renderMarkdown(text) {
    const lines = text.split('\n');
    let html = '';
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];

      // Fenced code block
      const fenceMatch = line.match(/^```(\w*)/);
      if (fenceMatch) {
        const lang = fenceMatch[1] || '';
        const codeLines = [];
        i++;
        while (i < lines.length && !lines[i].startsWith('```')) {
          codeLines.push(lines[i]);
          i++;
        }
        const code = codeLines.join('\n');
        const copyId = 'cb_' + Math.random().toString(36).slice(2);
        html += `<pre><div class="code-header"><span>${escHtml(lang) || 'code'}</span><button onclick="copyCode('${copyId}')" style="font-size:0.65rem;padding:2px 8px">copy</button></div><code id="${copyId}">${highlightCode(code, lang)}</code></pre>`;
        i++;
        continue;
      }

      // Headings
      const h3 = line.match(/^### (.+)/);
      const h2 = line.match(/^## (.+)/);
      const h1 = line.match(/^# (.+)/);
      if (h1) { html += `<h1>${inlineRender(h1[1])}</h1>`; i++; continue; }
      if (h2) { html += `<h2>${inlineRender(h2[1])}</h2>`; i++; continue; }
      if (h3) { html += `<h3>${inlineRender(h3[1])}</h3>`; i++; continue; }

      // HR
      if (/^---+$/.test(line.trim())) { html += '<hr>'; i++; continue; }

      // Blockquote
      if (line.startsWith('> ')) {
        html += `<blockquote>${inlineRender(line.slice(2))}</blockquote>`;
        i++; continue;
      }

      // Lists
      if (/^[-*+] /.test(line)) {
        html += '<ul>';
        while (i < lines.length && /^[-*+] /.test(lines[i])) {
          html += `<li>${inlineRender(lines[i].replace(/^[-*+] /, ''))}</li>`;
          i++;
        }
        html += '</ul>';
        continue;
      }
      if (/^\d+\. /.test(line)) {
        html += '<ol>';
        while (i < lines.length && /^\d+\. /.test(lines[i])) {
          html += `<li>${inlineRender(lines[i].replace(/^\d+\. /, ''))}</li>`;
          i++;
        }
        html += '</ol>';
        continue;
      }

      // Blank line
      if (line.trim() === '') { i++; continue; }

      // Paragraph
      html += `<p>${inlineRender(line)}</p>`;
      i++;
    }
    return html;
  }

  function inlineRender(text) {
    return escHtml(text)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/~~(.+?)~~/g, '<del>$1</del>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  }

  // ── Format detection ──────────────────────────────────────────────────

  function detectFormat(data) {
    if (data.object === 'chat.completion' || data.choices) return 'openai';
    if (data.type === 'message' || (data.content && Array.isArray(data.content))) return 'anthropic';
    return 'unknown';
  }

  // ── Extract messages ──────────────────────────────────────────────────

  function extractMessages(data, fmt) {
    // Returns array of { role, content (string), reasoning (string|null) }
    if (fmt === 'openai') {
      return (data.choices || []).map(c => {
        const msg = c.message || {};
        return {
          role: msg.role || 'assistant',
          content: msg.content || '',
          reasoning: msg.reasoning_content || null,
          finish_reason: c.finish_reason,
        };
      });
    }
    if (fmt === 'anthropic') {
      const blocks = Array.isArray(data.content) ? data.content : [];
      let reasoning = null;
      let content = '';
      for (const b of blocks) {
        if (b.type === 'thinking') reasoning = (reasoning || '') + b.thinking;
        else if (b.type === 'text') content += b.text;
      }
      // Fallback for simple string content
      if (!content && typeof data.content === 'string') content = data.content;
      return [{ role: data.role || 'assistant', content, reasoning, finish_reason: data.stop_reason }];
    }
    return [];
  }

  // ── Build stats ────────────────────────────────────────────────────────

  function buildStats(data, fmt, messages) {
    const usage = data.usage || {};
    const groups = [];

    // Model info
    const modelInfo = [];
    if (data.model) modelInfo.push({ label: 'Model', value: data.model, cls: 'highlight' });
    if (data.id)    modelInfo.push({ label: 'ID', value: data.id.slice(0, 24) + (data.id.length > 24 ? '…' : '') });
    if (data.created) {
      const d = new Date(data.created * 1000);
      modelInfo.push({ label: 'Created', value: d.toLocaleString() });
    }
    if (fmt !== 'unknown') modelInfo.push({ label: 'Format', value: fmt === 'openai' ? 'OpenAI' : 'Anthropic', cls: 'purple' });
    if (modelInfo.length) groups.push({ title: 'Response Info', rows: modelInfo });

    // Token usage
    const tokenRows = [];
    // OpenAI
    if (usage.prompt_tokens != null)     tokenRows.push({ label: 'Prompt tokens',     value: usage.prompt_tokens.toLocaleString() });
    if (usage.completion_tokens != null) tokenRows.push({ label: 'Completion tokens', value: usage.completion_tokens.toLocaleString(), cls: 'highlight' });
    if (usage.total_tokens != null)      tokenRows.push({ label: 'Total tokens',      value: usage.total_tokens.toLocaleString(), cls: 'good' });
    // OpenAI reasoning tokens (o1/o3)
    const compDetails = usage.completion_tokens_details || {};
    if (compDetails.reasoning_tokens != null) tokenRows.push({ label: 'Reasoning tokens', value: compDetails.reasoning_tokens.toLocaleString(), cls: 'purple' });
    if (compDetails.audio_tokens != null)     tokenRows.push({ label: 'Audio tokens',     value: compDetails.audio_tokens.toLocaleString() });
    // Anthropic
    if (usage.input_tokens != null)   tokenRows.push({ label: 'Input tokens',   value: usage.input_tokens.toLocaleString() });
    if (usage.output_tokens != null)  tokenRows.push({ label: 'Output tokens',  value: usage.output_tokens.toLocaleString(), cls: 'highlight' });
    if (usage.cache_read_input_tokens != null)    tokenRows.push({ label: 'Cache read',    value: usage.cache_read_input_tokens.toLocaleString(), cls: 'good' });
    if (usage.cache_creation_input_tokens != null) tokenRows.push({ label: 'Cache write',  value: usage.cache_creation_input_tokens.toLocaleString() });
    if (tokenRows.length) groups.push({ title: 'Token Usage', rows: tokenRows, showBar: true, usage });

    // Per-message stats
    const msgRows = [];
    messages.forEach((m, idx) => {
      const charCount = m.content.length;
      const wordCount = m.content.trim().split(/\s+/).filter(Boolean).length;
      msgRows.push({ label: `[${idx}] chars`, value: charCount.toLocaleString() });
      msgRows.push({ label: `[${idx}] words`, value: wordCount.toLocaleString() });
      if (m.reasoning) {
        msgRows.push({ label: `[${idx}] reasoning chars`, value: m.reasoning.length.toLocaleString(), cls: 'purple' });
      }
      if (m.finish_reason) msgRows.push({ label: `[${idx}] finish`, value: m.finish_reason, cls: m.finish_reason === 'stop' ? 'good' : 'warn' });
    });
    if (msgRows.length) groups.push({ title: 'Message Stats', rows: msgRows });

    return groups;
  }

  function renderStats(groups, usage) {
    if (!groups.length) {
      statsEl.innerHTML = '<div class="empty-stats">No metadata found.</div>';
      return;
    }

    const totalIn  = usage.prompt_tokens  || usage.input_tokens  || 0;
    const totalOut = usage.completion_tokens || usage.output_tokens || 0;
    const total    = totalIn + totalOut || 1;

    let html = '';
    for (const g of groups) {
      html += `<div class="stat-group"><h3>${escHtml(g.title)}</h3>`;
      for (const r of g.rows) {
        html += `<div class="stat-row"><span class="stat-label">${escHtml(r.label)}</span><span class="stat-value ${r.cls || ''}">${escHtml(String(r.value))}</span></div>`;
      }
      if (g.showBar && totalOut > 0) {
        const pct = Math.round((totalOut / total) * 100);
        html += `<div class="token-bar"><div class="token-bar-fill" style="width:${pct}%"></div></div>`;
        html += `<div style="font-size:0.68rem;color:#475569;margin-top:4px;text-align:right">${pct}% output</div>`;
      }
      html += '</div>';
    }
    statsEl.innerHTML = html;
  }

  // ── Render messages ───────────────────────────────────────────────────

  function renderMessages(messages) {
    if (!messages.length) {
      outputEl.innerHTML = '<span style="color:#f87171;font-size:0.82rem;">No messages found in response.</span>';
      return;
    }
    let html = '';
    for (const m of messages) {
      const roleClass = `role-${m.role}`;
      html += `<span class="role-pill ${roleClass}">${escHtml(m.role)}</span>`;

      if (m.reasoning) {
        const bid = 'r_' + Math.random().toString(36).slice(2);
        html += `<div class="reasoning-block">
          <div class="reasoning-header" onclick="toggleReasoning('${bid}')">
            <span>&#x1F9E0; Reasoning / Thinking</span>
            <span id="${bid}_arrow">&#x25B2;</span>
          </div>
          <div class="reasoning-body" id="${bid}">${escHtml(m.reasoning)}</div>
        </div>`;
      }

      html += `<div class="rendered">${renderMarkdown(m.content)}</div>`;
      html += '<hr style="margin:18px 0">';
    }
    outputEl.innerHTML = html;
  }

  // ── Main parse ────────────────────────────────────────────────────────

  function parse() {
    const raw = inputEl.value.trim();
    if (!raw) { statusIn.innerHTML = '<span>No input.</span>'; return; }

    let data;
    try {
      data = JSON.parse(raw);
    } catch (e) {
      statusIn.innerHTML = `<span class="err">JSON error: ${escHtml(e.message)}</span>`;
      return;
    }

    const fmt = detectFormat(data);
    const messages = extractMessages(data, fmt);
    const statGroups = buildStats(data, fmt, messages);

    renderMessages(messages);
    renderStats(statGroups, data.usage || {});

    const mCount = messages.length;
    const hasReasoning = messages.some(m => m.reasoning);
    statusIn.innerHTML = `<span class="ok">✔ Parsed · ${mCount} message${mCount !== 1 ? 's' : ''}${hasReasoning ? ' · reasoning detected' : ''}</span>`;
  }

  // ── Helpers exposed to inline handlers ───────────────────────────────

  window.toggleReasoning = (id) => {
    const el    = document.getElementById(id);
    const arrow = document.getElementById(id + '_arrow');
    const hidden = el.style.display === 'none';
    el.style.display = hidden ? '' : 'none';
    arrow.innerHTML = hidden ? '&#x25B2;' : '&#x25BC;';
  };

  window.copyCode = (id) => {
    const el = document.getElementById(id);
    if (el) navigator.clipboard.writeText(el.textContent);
  };

  // ── Button wiring ─────────────────────────────────────────────────────

  document.getElementById('btn-parse').addEventListener('click', parse);

  document.getElementById('btn-clear').addEventListener('click', () => {
    inputEl.value = '';
    outputEl.innerHTML = '<span style="color:#3d4f6b;font-size:0.82rem;">Parsed output will appear here…</span>';
    statsEl.innerHTML  = '<div class="empty-stats">Parse a response to see stats.</div>';
    statusIn.innerHTML = '';
  });

  document.getElementById('btn-copy-md').addEventListener('click', async () => {
    const text = outputEl.innerText;
    if (!text) return;
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('btn-copy-md');
    btn.textContent = 'Copied!';
    setTimeout(() => (btn.textContent = 'Copy text'), 1500);
  });
