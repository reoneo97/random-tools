<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e2533;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: #f8fafc; }

    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: #1e3a5f;
      color: #60a5fa;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-bottom: 1px solid #1e2533;
      flex-wrap: wrap;
    }

    .toolbar label { font-size: 0.8rem; color: #94a3b8; }

    select, button {
      font-size: 0.8rem;
      border-radius: 6px;
      border: 1px solid #2d3748;
      background: #1a2035;
      color: #e2e8f0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    select { padding: 5px 8px; }
    select:focus { outline: none; border-color: #3b82f6; }

    button {
      padding: 5px 14px;
      font-weight: 500;
    }
    button:hover { background: #243050; border-color: #3b82f6; }
    button:active { background: #1e3a5f; }

    button.primary {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }
    button.primary:hover { background: #1d4ed8; border-color: #1d4ed8; }

    button.danger { color: #f87171; border-color: #7f1d1d; }
    button.danger:hover { background: #7f1d1d33; }

    .sep { width: 1px; height: 20px; background: #2d3748; margin: 0 4px; }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
    }

    @media (max-width: 700px) {
      .panels { grid-template-columns: 1fr; }
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1e2533;
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 8px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #1e2533;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header .actions { display: flex; gap: 6px; }

    textarea, .output {
      flex: 1;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      padding: 16px;
      background: transparent;
      color: #e2e8f0;
      border: none;
      resize: none;
      overflow: auto;
      outline: none;
      white-space: pre;
    }

    textarea::placeholder { color: #3d4f6b; }

    .output { tab-size: 4; }

    /* Syntax highlighting */
    .tok-key    { color: #60a5fa; }
    .tok-str    { color: #34d399; }
    .tok-num    { color: #fb923c; }
    .tok-bool   { color: #a78bfa; }
    .tok-null   { color: #a78bfa; }
    .tok-punct  { color: #64748b; }

    .status-bar {
      padding: 5px 16px;
      font-size: 0.72rem;
      color: #64748b;
      border-top: 1px solid #1e2533;
      min-height: 26px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-bar .err  { color: #f87171; }
    .status-bar .ok   { color: #34d399; }
    .status-bar .info { color: #60a5fa; }
  </style>
</head>
<body>

<header>
  <h1>JSON Formatter</h1>
  <span class="badge">No dependencies</span>
</header>

<div class="toolbar">
  <label for="indent">Indent</label>
  <select id="indent">
    <option value="2">2 spaces</option>
    <option value="4" selected>4 spaces</option>
    <option value="tab">Tab</option>
  </select>

  <div class="sep"></div>

  <button id="btn-sort">Sort keys</button>
  <button id="btn-compact">Compact</button>

  <div class="sep"></div>

  <button class="primary" id="btn-format">Format ↵</button>
  <button class="danger" id="btn-clear">Clear</button>
</div>

<div class="panels">
  <div class="panel">
    <div class="panel-header">
      Input
      <div class="actions">
        <button id="btn-paste">Paste</button>
        <button id="btn-sample">Sample</button>
      </div>
    </div>
    <textarea id="input" placeholder='Paste your JSON here and click Format, or press Ctrl+Enter…' spellcheck="false"></textarea>
    <div class="status-bar" id="status-in"></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      Output
      <div class="actions">
        <button id="btn-copy">Copy</button>
      </div>
    </div>
    <div class="output" id="output" aria-label="Formatted JSON output"></div>
    <div class="status-bar" id="status-out"></div>
  </div>
</div>

<script>
(() => {
  const input     = document.getElementById('input');
  const output    = document.getElementById('output');
  const indentSel = document.getElementById('indent');
  const statusIn  = document.getElementById('status-in');
  const statusOut = document.getElementById('status-out');

  let sortKeys = false;

  // ── helpers ──────────────────────────────────────────────────────────────

  function getIndent() {
    const v = indentSel.value;
    return v === 'tab' ? '\t' : Number(v);
  }

  function setStatus(el, msg, type = '') {
    el.innerHTML = `<span class="${type}">${msg}</span>`;
  }

  function deepSort(val) {
    if (Array.isArray(val)) return val.map(deepSort);
    if (val && typeof val === 'object') {
      return Object.fromEntries(
        Object.keys(val).sort().map(k => [k, deepSort(val[k])])
      );
    }
    return val;
  }

  // ── syntax highlighting ───────────────────────────────────────────────────

  function highlight(json) {
    return json
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(
        /("(\\u[\da-fA-F]{4}|\\[^u]|[^"\\])*")(\s*:)?|(-?\d+\.?\d*(?:[eE][+-]?\d+)?)|true|false|null|[{}\[\],]/g,
        match => {
          if (/^"/.test(match)) {
            return match.endsWith(':')
              ? `<span class="tok-key">${match.slice(0, -1)}</span>:`
              : `<span class="tok-str">${match}</span>`;
          }
          if (/true|false/.test(match)) return `<span class="tok-bool">${match}</span>`;
          if (/null/.test(match))       return `<span class="tok-null">${match}</span>`;
          if (/[{}\[\],]/.test(match))  return `<span class="tok-punct">${match}</span>`;
          return `<span class="tok-num">${match}</span>`;
        }
      );
  }

  // ── format ────────────────────────────────────────────────────────────────

  function format(compact = false) {
    const raw = input.value.trim();
    if (!raw) { setStatus(statusIn, 'No input.'); return; }

    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (e) {
      setStatus(statusIn, `✖ ${e.message}`, 'err');
      output.innerHTML = '';
      setStatus(statusOut, '');
      return;
    }

    const data = sortKeys ? deepSort(parsed) : parsed;
    const indent = compact ? undefined : getIndent();
    const sep    = compact ? [',', ':'] : undefined;
    const result = JSON.stringify(data, null, compact ? undefined : indent);

    output.innerHTML = highlight(result);

    const bytes = new TextEncoder().encode(result).length;
    const keys  = result.match(/"[^"]+"\s*:/g)?.length ?? 0;

    setStatus(statusIn, '✔ Valid JSON', 'ok');
    setStatus(statusOut, `${bytes.toLocaleString()} bytes · ${keys.toLocaleString()} key${keys !== 1 ? 's' : ''}`, 'info');
  }

  // ── button wiring ─────────────────────────────────────────────────────────

  document.getElementById('btn-format').addEventListener('click', () => format());

  document.getElementById('btn-compact').addEventListener('click', () => format(true));

  document.getElementById('btn-sort').addEventListener('click', () => {
    sortKeys = !sortKeys;
    document.getElementById('btn-sort').textContent = sortKeys ? '✔ Sort keys' : 'Sort keys';
    if (output.textContent) format();
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    input.value = '';
    output.innerHTML = '';
    setStatus(statusIn, '');
    setStatus(statusOut, '');
    input.focus();
  });

  document.getElementById('btn-copy').addEventListener('click', async () => {
    const text = output.textContent;
    if (!text) return;
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => (btn.textContent = 'Copy'), 1500);
  });

  document.getElementById('btn-paste').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      input.value = text;
      format();
    } catch {
      setStatus(statusIn, 'Clipboard access denied — paste manually.', 'err');
    }
  });

  document.getElementById('btn-sample').addEventListener('click', () => {
    input.value = JSON.stringify({
      "name": "json-formatter",
      "version": "1.0.0",
      "author": { "name": "You", "email": "you@example.com" },
      "tags": ["tool", "json", "formatter"],
      "config": { "indent": 4, "sortKeys": false, "compact": false },
      "active": true,
      "score": 9.8,
      "notes": null
    });
    format();
  });

  // Ctrl+Enter to format
  input.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      format();
    }
  });

  // Live byte counter on input
  input.addEventListener('input', () => {
    const len = input.value.trim().length;
    setStatus(statusIn, len ? `${len.toLocaleString()} chars` : '');
  });
})();
</script>
</body>
</html>
